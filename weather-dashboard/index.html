<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | Sandile Nkosi</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p class="subtitle">by Sandile Nkosi</p>
        </header>
        
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." value="Johannesburg">
                <button id="searchBtn"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="recent-cities">
                <span>Recent: </span>
                <div id="recentCities"></div>
            </div>
        </div>
        
        <div class="weather-container">
            <!-- Current Weather Card -->
            <div class="current-weather">
                <div class="weather-header">
                    <div>
                        <h2 id="cityName">Johannesburg</h2>
                        <p id="date">Loading...</p>
                    </div>
                    <div class="temp-toggle">
                        <button id="celsiusBtn" class="active">°C</button>
                        <button id="fahrenheitBtn">°F</button>
                    </div>
                </div>
                
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="Weather icon">
                        <span id="weatherDesc"></span>
                    </div>
                    <div class="temperature">
                        <span id="temp">--</span>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail">
                        <i class="fas fa-tint"></i>
                        <span class="detail-label">Humidity</span>
                        <span class="detail-value" id="humidity">--</span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-wind"></i>
                        <span class="detail-label">Wind</span>
                        <span class="detail-value" id="wind">--</span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-compress-alt"></i>
                        <span class="detail-label">Pressure</span>
                        <span class="detail-value" id="pressure">--</span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-sun"></i>
                        <span class="detail-label">UV Index</span>
                        <span class="detail-value" id="uv">--</span>
                    </div>
                </div>
            </div>
            
            <!-- 5-Day Forecast -->
            <div class="forecast-section">
                <h3><i class="fas fa-calendar-alt"></i> 5-Day Forecast</h3>
                <div class="forecast-grid" id="forecast">
                    <!-- Forecast cards will be inserted here -->
                </div>
            </div>
        </div>
        
        <!-- Weather Tips -->
        <div class="weather-tips">
            <i class="fas fa-lightbulb"></i>
            <span id="weatherTip">Loading weather tips...</span>
        </div>
    </div>
    
    <!-- Footer with your info -->
    <footer>
        <p>© 2026 Sandile Nkosi | 060 523 9905 | abelnkosi2000@gmail.com</p>
        <p class="small">Data provided by OpenWeatherMap</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
